<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Chickchat7 - 純伺服器回顯聊天</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root { --t-bg: #0e0e10; --t-alt: #18181b; --t-purp: #9147ff; --t-text: #efeff1; --input-bg: #18181b; }
        body { background: var(--t-bg); color: var(--t-text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* --- Webkit Scrollbar 樣式 --- */
        #chat-container::-webkit-scrollbar, #emojiContent::-webkit-scrollbar, #emojiTabs::-webkit-scrollbar, #mention-list::-webkit-scrollbar { width: 8px; height: 8px; }
        #chat-container::-webkit-scrollbar-track, #emojiContent::-webkit-scrollbar-track, #emojiTabs::-webkit-scrollbar-track, #mention-list::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        #chat-container::-webkit-scrollbar-thumb, #emojiContent::-webkit-scrollbar-thumb, #emojiTabs::-webkit-scrollbar-thumb, #mention-list::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        #chat-container::-webkit-scrollbar-thumb:hover, #emojiContent::-webkit-scrollbar-thumb:hover, #emojiTabs::-webkit-scrollbar-thumb:hover, #mention-list::-webkit-scrollbar-thumb:hover { background: var(--t-purp); }

        /* 統一控制媒體嵌入大小 */
        #chat-container .media-preview,
        #chat-container iframe.media-preview,
        #chat-container iframe[src*="youtube.com"],
        #chat-container iframe[src*="youtube-nocookie.com"],
        #chat-container iframe[src*="youtu.be"],
        #chat-container iframe[src*="facebook.com"],
        #chat-container blockquote.twitter-tweet,
        #chat-container .twitter-tweet-container,
        #chat-container iframe[src*="store.steampowered.com"],
        #chat-container iframe[src*="threads.com"] {
            width: auto !important;
            height: auto !important;
            max-width: 250px !important;
            max-height: 450px !important;
            border-radius: 8px !important;
            border: 0px solid #444 !important;
            margin: 5px 0 !important;
            object-fit: fill !important;
        }

        #chat-container iframe[src*="youtube.com"],
        #chat-container iframe[src*="youtube-nocookie.com"],
        #chat-container blockquote.twitter-tweet,
        #chat-container iframe[src*="threads.com"],
        #chat-container iframe[src*="store.steampowered.com"] {
            min-height: 400px !important;
			max-height: 400px !important;
        }

        #chat-container iframe[src*="threads.com"] { background: #FFF !important; }

        #chat-container img.media-preview {
            height: auto !important;
            max-height: 250px !important;
            min-height: auto !important;
            object-fit: fill !important;
        }
        #chat-container video.media-preview {
            height: auto !important;
            max-height: 250px !important;
            min-height: auto !important;
        }

        .header-bar { background: var(--t-alt); padding: 0px 0px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; flex-shrink: 0; }
        #chat-container { flex: 1; overflow-y: auto; padding: 15px; background: #0e0e10; scroll-behavior: smooth; position: relative; word-wrap: break-word; overflow-wrap: break-word; }
        
        .chat-line { 
            position: relative; 
            border-radius: 4px; 
            line-height: 1.6; 
            word-wrap: break-word; 
            color: var(--t-text); 
            transition: background 0.3s, border 0.3s; 
            padding: 1px; 
            margin-bottom: 5px; 
            border: 1px solid transparent;
            content-visibility: auto;
            contain-intrinsic-size: 0 40px; 
        }

        .chat-line:hover { background: rgba(255,255,255,0.08); }
        .chat-line:has(.quote-box) { border: 1px solid #9147ff; background: rgba(145, 71, 255, 0.1) !important; margin-left: 2px; }
        .self-name { font-weight: bold; }
        .media-preview { max-width: 250px !important; max-height: 250px !important; border-radius: 6px; margin-top: 10px; vertical-align: top; display: block; border: 1px solid #444; }
       .quote-user { color: #adadb8; margin-right: 5px; }
       .mention-self-tag { background-color: #9147ff; color: #ffffff !important; padding: 2px 6px; border-radius: 4px; font-weight: bold; display: inline-block; margin-bottom: 2px; }
        .audio-player { margin-top: 10px; display: block; max-width: 300px; }
        .alt-emoji { max-width: 180px !important; max-height: 180px !important; vertical-align: top; margin: 2px; }
        .badge { width: 18px; height: 18px; vertical-align: middle; margin-right: 4px; display: inline-block; }
       

@keyframes blink {
    50% { opacity: 0.7; }
}

.control-btn {
    transition: all 0.3s ease;
}
        .reply-btn-group {
            position: absolute;
            right: 10px;
            top: 10px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        .reply-btn, .reply-btn2 {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #fff;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #555;
            transition: all 0.15s;
        }
        .reply-btn img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .reply-btn:hover, .reply-btn2:hover { background-color: #9147ff; border-color: #fff; transform: scale(1.05);}
        .chat-line:hover .reply-btn-group { display: flex; }
        .reply-btn-group { display: none; }
        
        .quote-box { 
            color: #adadb8; 
            padding: 6px 8px; 
            border-radius: 8px; 
            margin-bottom: 6px; 
            margin-top: 2px;
            line-height: 1.45; 
            display: block; 
            cursor: pointer; 
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(0, 0, 0, 0.2);
            transition: all 0.1s ease;
            word-break: break-word;
        }
        .quote-box:hover { 
            background: rgba(145, 71, 255, 0.15);
            border-color: rgba(145, 71, 255, 0.4);
        }
        
        .quote-box .quote-box {
            margin-left: 12px;
            border-left: 3px solid #9147ff;
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
            background: rgba(20, 20, 30, 0.4);
        }
        
        #scrollToBottomBtn {
            position: absolute;
            bottom: 80px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(145, 71, 255, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;

        }
        
        .delete-btn { position: absolute;top: -8px;right: -8px;background: #e91916;color: white;width: 20px;height: 20px;border-radius: 50%;font-size: 12px;line-height: 20px;text-align: center;cursor: pointer;display: none; z-index: 100; border: 1px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .show-del .delete-btn { display: block; }
        .audio-item { cursor:pointer; background:rgba(145,71,255,0.1); border:1px solid #444; border-radius:4px; padding:8px; text-align:center; font-size:11px; position:relative; color: #fff; }
        .audio-icon-btn { cursor: pointer; font-size: 20px; vertical-align: middle; display: inline-block; padding: 5px; background: rgba(145, 71, 255, 0.2); border-radius: 4px; transition: all 0.2s ease; user-select: none; }
        .audio-icon-btn.playing { background: #9147ff; color: white; border-color: white; animation: pulse-audio 1.5s infinite; }
        
        @keyframes pulse-audio {
            0% { box-shadow: 0 0 0 0px rgba(145, 71, 255, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(145, 71, 255, 0); }

        #userInfo { display: none; align-items: center; gap: 8px; font-size: 13px; }
        #userInfo img { width: 30px; height: 30px; border-radius: 50%; }
        #logoutBtn { background: #e91916; color: white; border: none; border-radius: 4px; padding: 6px 12px; cursor: pointer; font-size: 12px; font-weight: 600; transition: background-color 0.2s; margin-left: 8px; }
        #logoutBtn:hover { background: #c51614; }
        #loginBtn { background: #9147ff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; transition: background-color 0.2s; padding: 8px 16px; }
        #loginBtn:hover { background: #772ce8; }
        #status { margin: 8px 12px; font-weight: 500; color: #bf94ff; font-size: 10px; }
        
        #mention-list {
            position: absolute;
            bottom: 100%;
            left: 0;
            width: 300px;
            max-height: 350px;
            background: var(--t-alt);
            border: 1px solid #333;
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            z-index: 9999;
            display: none;
            overflow-y: auto;
            padding: 4px 0;
        }
        .mention-item {
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
            color: var(--t-text);
            font-size: 14px;
        }
        .mention-item:hover, .mention-item.selected {
            background: rgba(145, 71, 255, 0.2);
        }
        .mention-item .user-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
        }
        .mention-item .display-name {
            font-weight: 600;
            color: var(--t-purp);
        }
        .mention-item .login-name {
            color: #adadb8;
            font-size: 12px;
            margin-left: 4px;
        }
        .mention-header {
            padding: 8px 12px;
            font-size: 12px;
            color: #adadb8;
            border-bottom: 1px solid #333;
            margin-bottom: 4px;
            background: rgba(0,0,0,0.2);
        }

        .footer { background: #0e0e10; padding: 1px 10px 1px 10px; border-top: 0px solid rgba(255, 255, 255, 0.05); position: relative; }
        #reply-indicator { display:none; color:#adadb8; font-size:12px; margin-bottom:8px; padding:8px; background:rgba(145,71,255,0.1); border-radius:4px; border: 1px solid rgba(145,71,255,0.3); }
        .tool-bar { display: flex; gap: 3px; margin-bottom: -8px; align-items: center; }
        .tool-link { background: none; border: none; color: #adadb8; cursor: pointer; font-size: 14px; padding: 0; font-weight: 500; transition: color 0.2s; display: flex; align-items: center; }
        .tool-link:hover { color: #fff; }
        .tool-link svg { margin-left: 1px; }
        .input-section { position: relative; display: flex; flex-direction: column; gap: 10px; }
        .input-box-wrapper { position: relative; display: flex; align-items: center; background: var(--t-input); border: 1px solid #fff; border-radius: 8px; padding: 2px 10px; transition: border 0.2s;}
        .input-box-wrapper:focus-within { border-color: var(--t-purp); background: #000; }
        #msginput { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: #efeff1; 
            font-size: 14px; 
            outline: none; 
            padding: 10px 0; 
            font-family: inherit; 
            box-sizing: border-box; 
            overflow-wrap: break-word; 
            max-height: calc(5lh + 20px); 
            overflow: hidden auto;
            white-space: pre-wrap;
            min-height: 20px;
        }
        #msginput:empty:before {
            content: attr(placeholder);
            color: #777;
        }
        #msginput:disabled { cursor: not-allowed; opacity: 0.5; }
        .action-bar { display: flex; justify-content: flex-end; margin-top: 0px; }
        #sendbtn { background: var(--t-purp); border: none; color: white; cursor: pointer; padding: 6px 16px; border-radius: 18px; font-weight: bold; font-size: 14px; transition: background 0.2s; }
        #sendbtn:hover { background: #a970ff; }
        #sendbtn:disabled { background: #3a3a3d; color: #777; cursor: not-allowed; }
        .setting-btn { cursor: pointer; color: #efeff1; opacity: 0.8; display: flex; align-items: center; }
        .setting-btn:hover { opacity: 1; color: #9147ff; }

        #voice-btn {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        #voice-btn:hover {
            transform: scale(1.1);
        }

        #voice-btn.recording {
            color: #e91916;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.5; }
        }
        #emojiPanel { 
            position: fixed; 
            display: none; 
            width: 350px; 
            height: 400px; 
            background: #1f182e; 
            border: 2px solid #443a5a; 
            border-radius: 12px; 
            z-index: 5000; 
            left: 50%; 
            top: 50%; 
            transform: translate(-50%, -50%); 
            flex-direction: column; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: default;
        }
        #emojiPanel.dragging { cursor: grabbing; }
        .emoji-header { 
            padding: 12px; 
            display: flex; 
            justify-content: space-between; 
            background: #26262c; 
            border-radius: 12px 12px 0 0; 
            align-items: center;
            cursor: grab;
            user-select: none;
        }
        .emoji-header:active { cursor: grabbing; }
        #emojiTabs {display: flex;flex-wrap: wrap;background: #1f1f23;padding: 8px;gap: 5px;overflow-x auto;border-bottom: 1px solid #26262c;}
        #emojiContent { flex: 1;overflow-y: auto;padding: 10px;background: #18181b;display: flex;flex-wrap: wrap;gap: 5px;align-content: flex-start; }
        .emoji-tab { width: 36px;height: 36px;background: #3a3a3d;border-radius: 4px;cursor: pointer;background-size: cover;background-position: center;flex-shrink: 0; }
        .emoji-item { position: relative;width: 40px;height: 40px;border-radius: 4px;cursor: pointer;}
        .emoji-item img {width: 40px;height: 40px;border-radius: 4px;cursor: pointer;}
        .bttv-input-area, .audio-input-form { width: 100%;display: flex;gap: 6px;margin-bottom: 10px; }
        .custom-input { background: #000; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body onload="initApp()">

<div class="header-bar">
    <div id="status">載入中...</div>
    <div id="auth-area">
        <div id="userInfo" style="display:none;">
            <img id="userAvatar" src="" alt="頭像">

            <button id="sendbtn" onclick="sendMessage()" disabled>聊天</button>

    </div>

<script>
// ===================== 設定 =====================
const CLIENT_ID = '0uhjgjpko804ba35q1nj1h6x2eriq9';
let CHANNEL = "whitewing940920"; 
if (localStorage.getItem('twitch_channel')) CHANNEL = localStorage.getItem('twitch_channel');

const REDIRECT_URI = encodeURIComponent(location.origin + location.pathname);
const AUTH_URL = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=chat:read+chat:edit`;

// ===================== 全局變數 =====================
let ACCESS_TOKEN = "";
let myLoginId = "", myDisplayName = "", myAvatar = "", myBadges = "";
let socket = null;
let altMap = {};
let emojiLists = {};
let audioLists = {};
let customBadges = {};
let msgCache = {}; 
let userCache = {}; 
let pendingReply = { id: null, user: null, displayName: null };
let isDeleteMode = false, isAudioDeleteMode = false;
let myColor = "#9147ff";
let reconnectTimer = null, reconnectAttempts = 0, maxReconnectDelay = 30000, isConnecting = false;
let dragging = false, offsetX = 0, offsetY = 0;
let autoScroll = true, scrollTimeout = null;
const MAX_MESSAGES = 40;
let recentUsers = [], seenUsersSet = new Set(); 
let mentionListVisible = false, mentionSelectedIndex = 0, mentionSearchTerm = "";
const MAX_RTAG_DEPTH = 5;

// 正則
const RE_S_TAG = /\[S\](.*?)E\]/g;
const RE_s_TAG = /\[s\](.*?)e\]/g;
const RE_s_URL = /\[s\]\s*([^\s\[]+)/gi;
const RE_y_TAG = /\[y\](.*?)[\[]?t\]/gi;
const RE_y_URL = /\[y\]\s*([^\s\[]+)/gi;
const RE_a_TAG = /\[a\](.*?)\[o\]/gi;
const RE_HTTP_LINK = /(^|\s)(https?:\/\/[^\s]+)/gi;
const RE_IS_YOUTUBE = /youtu/i;
const RE_IS_IMG_EXT = /img|jpg|png|gif/i;
const RE_IS_TWITTER_X = /twitter|https:\/\/x\.com/i;
const RE_IS_THREADS = /www\.threads\.com/i;
const RE_IS_VIDEO_EXT = /\.(webm|mp4|m3u8|flv)/i;
const RE_IS_STEAM = /steampowered|steamcommunity/i;

// ===================== 工具函數 =====================
function getParameterByName(name, url) {
    name = name.replace(/[\[]/, "\\\[").replace(/[\]]/, "\\\]");
    let regex = new RegExp("[\\?&]" + name + "=([^&#]*)");
    let results = regex.exec(url);
    return results == null ? "" : decodeURIComponent(results[1].replace(/\+/g, " "));
}
function getTagValue(tags, key) { 
    const regex = new RegExp(`(?:^|;)${key}=([^;\\s]+)`); 
    const match = tags.match(regex); 
    return match ? match[1] : null; 
}
function limitMessages() { const children = $("#messages").children(); if(children.length > MAX_MESSAGES) children.slice(0, children.length - MAX_MESSAGES).remove(); }
function getUserDisplayName(userId, fallbackName) { return userCache[userId] || fallbackName; }
function renderBadges(badgeStr) {
    if(!badgeStr) return "";
    let html = "";
    badgeStr.split(',').forEach(b => { let url = customBadges[b] || customBadges[b.split('/')[0]]; if(url) html += `<img class="badge" src="${url}">`; });
    return html;
}
function getMyBadges() { return myBadges || ""; }
function forceScrollToBottom(force = false) { if (!force && !autoScroll) return; const chat = document.getElementById('chat-container'); if(chat) chat.scrollTop = chat.scrollHeight + 9999; }
function onMediaLoaded() { if(autoScroll) setTimeout(()=>forceScrollToBottom(false),50); }
let messageBuffer = [];
function appendMessageWithScroll(html) {
    if (document.hidden) { messageBuffer.push(html); if(messageBuffer.length>50) messageBuffer.shift(); return; }
    $("#messages").append(html);
    limitMessages();
    if (autoScroll) forceScrollToBottom(false);
}
document.addEventListener('visibilitychange', () => {
    if (!document.hidden && messageBuffer.length) { $("#messages").append(messageBuffer.join('')); messageBuffer = []; limitMessages(); forceScrollToBottom(true); }
});
function checkScrollPosition() { const chat = document.getElementById('chat-container'); const isAtBottom = chat.scrollHeight - chat.clientHeight - chat.scrollTop < 60; autoScroll = isAtBottom; if(scrollToBottomBtn) scrollToBottomBtn.style.display = autoScroll ? 'none' : 'flex'; }

function parseContent(str) {

    a = a.replace(RE_y_URL, (m, b) => { let id = `__PH_${placeholders.length}__`, e = ""; if (RE_IS_YOUTUBE.test(b)) { let vid = b.includes('watch?') ? getParameterByName('v', b) : b.replace(/.*(youtu.be\/|youtube.com\/embed\/)/, ''); e = `<iframe class="media-preview" src="https://www.youtube.com/embed/${vid}" frameborder="0" allowfullscreen onload="onMediaLoaded()" loading="lazy"></iframe>`; } else { e = `<a href="${b}" target="_blank" style="color:#58a6ff;">${b}</a>`; } placeholders.push(e); return id; });

function processRTag(str, depth = 0) {

        const quotedMsg = msgCache[ts];

        const parsedQuote = parseContent(processRTag(quotedMsg.content, depth + 1));
        return `<div class="quote-box"><svg width="17" height="17" viewBox="0 0 24 20" fill="currentColor"><path d="M9 10h2v2H9v-2Zm6 0h-2v2h2v-2Z"></path><path fill-rule="evenodd" d="m12 22-3-3H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v12a2 2 0 0 1 2 2h-4l-3 3Zm-2.172-5L12 19.172 14.172 17H19V5H5v12h4.828Z" clip-rule="evenodd"></path></svg> 引用${mentionHtml}:${parsedQuote}</div>`;
    });
}

// ===================== WebSocket連線 =====================
function startChat() {
    if(isConnecting || (socket && socket.readyState === WebSocket.OPEN)) return;
    if(socket) { socket.onclose=null; try{socket.close();}catch(e){} socket=null; }
    isConnecting = true; clearReconnectTimer();
    socket = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
    socket.onopen = () => {
        isConnecting = false; clearReconnectTimer();
        socket.send('CAP REQ :twitch.tv/tags twitch.tv/commands');
        let pass, nick;
        if(ACCESS_TOKEN) { pass = `oauth:${ACCESS_TOKEN}`; nick = myLoginId || 'justinfan'+Math.floor(Math.random()*900000+100000); }
        else { let rand = Math.floor(Math.random()*900000)+100000; pass = `justinfan${rand}`; nick = `justinfan${rand}`; }
        socket.send(`PASS ${pass}`); socket.send(`NICK ${nick}`); socket.send(`JOIN #${CHANNEL}`);
        document.getElementById('status').textContent = (ACCESS_TOKEN ? `已登入連線到 ${CHANNEL}` : `匿名連線到 ${CHANNEL} (僅觀看)`);
        document.getElementById('msginput').disabled = !ACCESS_TOKEN; document.getElementById('sendbtn').disabled = !ACCESS_TOKEN;
    };
    socket.onclose = (event) => { isConnecting = false; if(event.code !== 1000) scheduleReconnect(); document.getElementById('status').textContent = `已斷線 (${event.code})，重連中...`; };
    socket.onmessage = (e) => {
        let data = e.data;
        if(data.startsWith('PING')) { socket.send('PONG :tmi.twitch.tv'); return; }
        if(data.includes('CAP') || data.includes('USERSTATE')) {
            if(data.includes('USERSTATE')) { let badgeTag = getTagValue(data,"badges"); if(badgeTag) { myBadges = badgeTag; localStorage.setItem('twitch_my_badges', badgeTag); } let colorTag = getTagValue(data,"color"); if(colorTag) myColor = colorTag; }
            return;
        }
        if(!data.includes('PRIVMSG')) return;
        let privmsgIdx = data.indexOf(` PRIVMSG #${CHANNEL} :`);
        if(privmsgIdx === -1) return;
        let leftPart = data.substring(0, privmsgIdx);
        let rawMsg = data.substring(privmsgIdx + ` PRIVMSG #${CHANNEL} :`.length).trim();
        let tags = leftPart, source = "";
        if(leftPart.includes(' :')){ let spaceIdx = leftPart.lastIndexOf(' :'); if(spaceIdx !== -1){ tags = leftPart.substring(0, spaceIdx); source = leftPart.substring(spaceIdx+2); } }
        let nickFromSource = source.includes('!') ? source.substring(0, source.indexOf('!')) : "";
        let msgId = getTagValue(tags, "id");
        let ts = getTagValue(tags, "tmi-sent-ts") || Date.now().toString();
        let user = getTagValue(tags, "display-name") || "User";
        let color = getTagValue(tags, "color") || "#9147ff";
        let badgeStr = getTagValue(tags, "badges");
        let userLogin = nickFromSource || getTagValue(tags, "login") || user.toLowerCase();
        userCache[userLogin] = user;
        let msgRecord = { content: rawMsg, user: { login: userLogin, displayName: user }, displayName: user, badges: badgeStr, avatar: 'https://static-cdn.jtvnw.net/user-default-pictures-uv/75305d54-c7cc-40d1-bb9c-91fbe85943c7-profile_image-70x70.png', timestamp: parseInt(ts) };
        if(msgId) msgCache[msgId] = msgRecord;
        msgCache[ts] = msgRecord;
        addRecentUser({ login: userLogin, displayName: user, badges: badgeStr, avatar: msgRecord.avatar });
        let replyHtml = "", displayMsg = rawMsg;
        let pUser = getTagValue(tags, "reply-parent-display-name");
        let pId = getTagValue(tags, "reply-parent-msg-id");
        let pBodyRaw = getTagValue(tags, "reply-parent-msg-body");
        if(pUser && pId){
            let isMe = (pUser === myDisplayName || pUser === myLoginId);
            let originalText = pBodyRaw ? pBodyRaw.replace(/\\s/g, " ") : "...";
            let pBody = parseContent(processRTag(originalText,0));
            let userTagClass = isMe ? 'quote-user mention-self-tag' : 'quote-user';
            replyHtml = `<div class="quote-box" onclick="scrollToMsg('${pId}')"><svg width="17" height="17" viewBox="0 0 24 20" fill="currentColor"><path d="M9 10h2v2H9v-2Zm6 0h-2v2h2v-2Z"></path><path fill-rule="evenodd" d="m12 22-3-3H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v12a2 2 0 0 1 2 2h-4l-3 3Zm-2.172-5L12 19.172 14.172 17H19V5H5v12h4.828Z" clip-rule="evenodd"></path></svg> 回覆<span class="${userTagClass}">@${pUser}:</span>${pBody}</div>`;
            let mention = `@${pUser} `;
            if(displayMsg.startsWith(mention)) displayMsg = displayMsg.substring(mention.length);
        }
        displayMsg = processRTag(displayMsg, 0);
        let contentHtml = parseContent(displayMsg);
        let badgeHtml = renderBadges(badgeStr);
        let line = `<div class="chat-line ts-${ts} id-${msgId||ts}" data-user-login="${userLogin}" data-msg-ts="${ts}">
            <div class="reply-btn-group"><div class="reply-btn" onclick="replyNative('${userLogin}','${msgId||ts}','${user}')"><img src="https://chicktv.github.io/tv/re2.png"></div><div class="reply-btn2" onclick="insertRecursiveQuote('${userLogin}','${ts}')">🔗</div></div>
            ${replyHtml}${badgeHtml}<b style="color:${color}">${user}:</b> <span>${contentHtml}</span>
        </div>`;
        appendMessageWithScroll(line);
    };
}

// ===================== 登入與初始化 =====================
function checkLogin() { const saved = localStorage.getItem('twitch_token'); if(saved) { ACCESS_TOKEN = saved.replace('oauth:', ''); fetchUserInfo(ACCESS_TOKEN); } else startChat(); }
function loginWithPopup() { const w=600, h=700, left=(screen.width-w)/2, top=(screen.height-h)/2; const popup = window.open(AUTH_URL, 'Twitch Login', `width=${w},height=${h},left=${left},top=${top},resizable=yes,scrollbars=yes`); const check = setInterval(()=>{ if(popup.closed){ clearInterval(check); const token = localStorage.getItem('twitch_token'); if(token){ ACCESS_TOKEN = token.replace('oauth:',''); fetchUserInfo(token); } } },500); }
async function fetchUserInfo(token) { try { const res = await fetch('https://api.twitch.tv/helix/users', { headers: { 'Client-ID': CLIENT_ID, 'Authorization': 'Bearer ' + token } }); const data = await res.json(); if(data.data?.[0]){ myLoginId = data.data[0].login; myDisplayName = data.data[0].display_name; myAvatar = data.data[0].profile_image_url; loginSuccess(); } } catch(e){ alert('登入失敗'); logout(); } }
function loginSuccess() { document.getElementById('status').textContent = `已登入：${myDisplayName}`; document.getElementById('msginput').disabled = false; document.getElementById('sendbtn').disabled = false; document.getElementById('loginBtn').style.display = 'none'; document.getElementById('userInfo').style.display = 'flex'; document.getElementById('userAvatar').src = myAvatar; document.getElementById('userName').textContent = myDisplayName; if(socket) socket.close(); startChat(); }
function logout() { localStorage.removeItem('twitch_token'); location.reload(); }
function setupAutoTag() { document.getElementById('msginput').addEventListener('paste', function(e) { const text = e.clipboardData.getData('text/plain'); const sel = window.getSelection(); if(!sel.rangeCount) return; const pos = sel.getRangeAt(0).startOffset; const before = this.textContent.substring(0,pos); if(before.endsWith('[s] ')) { e.preventDefault(); document.execCommand('insertText', false, text+' [e]'); } else if(before.endsWith('[y] ')) { e.preventDefault(); document.execCommand('insertText', false, text+' [t]'); } else if(before.endsWith('[a] ')) { e.preventDefault(); document.execCommand('insertText', false, text+' [o]'); } }); }
function setupEmojiPanelDrag() { const panel = document.getElementById('emojiPanel'); const header = panel.querySelector('.emoji-header'); const closeBtn = document.getElementById('emojiCloseBtn'); header.addEventListener('mousedown',(e)=>{ if(e.target === closeBtn) return; dragging=true; offsetX=e.clientX-panel.offsetLeft; offsetY=e.clientY-panel.offsetTop; panel.classList.add('dragging'); e.preventDefault(); }); document.addEventListener('mousemove',(e)=>{ if(!dragging) return; panel.style.left=(e.clientX-offsetX)+'px'; panel.style.top=(e.clientY-offsetY)+'px'; panel.style.transform='none'; }); document.addEventListener('mouseup',()=>{ dragging=false; panel.classList.remove('dragging'); }); closeBtn.addEventListener('click',()=>panel.style.display='none'); }

async function initApp() {
    if(location.hash.includes('access_token=')){ const token = new URLSearchParams(location.hash.slice(1)).get('access_token'); if(token){ localStorage.setItem('twitch_token', 'oauth:'+token); if(window.opener) window.close(); else { history.replaceState(null,null,location.pathname); ACCESS_TOKEN = token; fetchUserInfo(token); } } } else checkLogin();
    document.getElementById('loginBtn').onclick = loginWithPopup; document.getElementById('logoutBtn').onclick = logout;
    document.querySelector('.setting-btn').addEventListener('click',()=>{ let newChannel = prompt("請輸入頻道",CHANNEL); if(newChannel){ CHANNEL = newChannel.trim().toLowerCase(); localStorage.setItem('twitch_channel',CHANNEL); if(socket) { socket.onclose=null; socket.close(); socket=null; } startChat(); document.getElementById('status').textContent = `已切換至 #${CHANNEL}，重新連線...`; } });
    setupScrollListener(); await fetchBadges(); await loadResources(); setupAutoTag(); setupMentionEvents(); setupEmojiPanelDrag(); if(!ACCESS_TOKEN) startChat(); fetchRecentMessages(); scrollToBottomBtn.addEventListener('click',()=>forceScrollToBottom(true)); document.getElementById('msginput').addEventListener('keydown',(e)=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); } });
}
initApp();
</script>
